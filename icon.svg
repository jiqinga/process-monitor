<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="windowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" ry="24" fill="url(#bgGrad)" />
  
  <!-- Window frame -->
  <rect x="16" y="20" width="96" height="88" rx="8" ry="8" fill="url(#windowGrad)" stroke="#475569" stroke-width="1" />
  
  <!-- Title bar -->
  <rect x="16" y="20" width="96" height="24" rx="8" ry="8" fill="#334155" />
  <rect x="16" y="36" width="96" height="8" fill="#334155" />
  
  <!-- Window controls -->
  <circle cx="28" cy="32" r="4" fill="#ef4444" />
  <circle cx="40" cy="32" r="4" fill="#f59e0b" />
  <circle cx="52" cy="32" r="4" fill="#10b981" />
  
  <!-- Chart area -->
  <rect x="24" y="52" width="80" height="48" rx="4" ry="4" fill="#0f172a" opacity="0.5" />
  
  <!-- Monitoring chart line -->
  <polyline points="28,88 36,78 44,82 52,68 60,75 68,62 76,70 84,58 92,65 100,55" 
            fill="none" stroke="url(#chartGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Grid lines -->
  <line x1="28" y1="60" x2="100" y2="60" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
  <line x1="28" y1="70" x2="100" y2="70" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
  <line x1="28" y1="80" x2="100" y2="80" stroke="#334155" stroke-width="0.5" opacity="0.5"/>
  
  <!-- CPU usage indicator -->
  <rect x="24" y="100" width="30" height="6" rx="3" ry="3" fill="#1e293b" />
  <rect x="24" y="100" width="22" height="6" rx="3" ry="3" fill="#6366f1" />
  
  <!-- Memory usage indicator -->
  <rect x="58" y="100" width="30" height="6" rx="3" ry="3" fill="#1e293b" />
  <rect x="58" y="100" width="18" height="6" rx="3" ry="3" fill="#818cf8" />
  
  <!-- Process count indicator -->
  <rect x="92" y="100" width="12" height="6" rx="3" ry="3" fill="#1e293b" />
  <rect x="92" y="100" width="8" height="6" rx="3" ry="3" fill="#a5b4fc" />
  
  <!-- Data points -->
  <circle cx="52" cy="68" r="2" fill="#818cf8" opacity="0.8"/>
  <circle cx="68" cy="62" r="2" fill="#6366f1" opacity="0.8"/>
  <circle cx="84" cy="58" r="2" fill="#4f46e5" opacity="0.8"/>
</svg>
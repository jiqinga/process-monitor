name: Release

# 推送形如 v0.1.0 的 tag 时触发:构建 Windows 安装包并发布到 GitHub Release
on:
  push:
    tags:
      - 'v*'

# tauri-action 创建 Release、上传产物需要写权限
permissions:
  contents: write

jobs:
  release-windows:
    name: Build & Release (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci --no-audit --no-fund

      - name: Build & publish Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # 用推送的 tag 名作为 Release tag(如 v0.1.0)
          tagName: ${{ github.ref_name }}
          releaseName: 'Process Monitor ${{ github.ref_name }}'
          # 由 GitHub Release Notes API 按 tag 区间自动生成变更列表(commit / PR / 贡献者)
          generateReleaseNotes: true
          # releaseBody 会被追加到自动生成的变更列表「上方」,作为安装指引
          releaseBody: |
            ## 📦 安装说明

            下载下方对应的安装包:

            - **`.exe`(-setup.exe)** — NSIS 安装程序,推荐大多数用户使用
            - **`.msi`** — Windows Installer 包,适用于企业批量部署

            > 若曾安装过旧版本,建议先卸载再安装,避免残留导致异常。

            ---

            ### 📝 更新内容
          releaseDraft: false
          prerelease: false
